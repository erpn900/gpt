<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SchooLama Dashboard</title>
    <meta name="description" content="Google Apps Script + GitHub Pages school management dashboard" />
    <link rel="icon" href="assets/logo.png" />
    <link rel="stylesheet" href="css/styles.css" />
    <style>
      .startup-fallback{min-height:100vh;display:grid;place-items:center;background:#f7f8fb;font-family:Arial,sans-serif;color:#25324b;padding:24px}
      .startup-fallback>div{max-width:640px;background:#fff;border:1px solid #e5e7eb;border-radius:18px;padding:24px;box-shadow:0 20px 60px rgba(15,23,42,.08)}
      .startup-fallback code{background:#f1f5f9;padding:2px 6px;border-radius:6px}
    </style>
  </head>
  <body>
    <div id="app">
      <main class="startup-fallback">
        <div>
          <h1>Loading school dashboard...</h1>
          <p>If this message stays on screen, GitHub Pages is not loading <code>config.js</code> or <code>js/app.js</code>. Make sure the contents of the <code>frontend</code> folder are published at the GitHub Pages root.</p>
        </div>
      </main>
    </div>
    <script src="config.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
